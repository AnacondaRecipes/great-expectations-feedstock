{% set name = "great-expectations" %}
{% set version = "1.4.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 23dd225a9ac3a1aac4e234c29617f323c1ebbe3411b2cf65bb8c13d1faeef167

build:
  # Python 3.13 is not supported by upstream
  skip: True  # [py<39 or py>312]
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - altair >=4.2.1,<5.0.0
    - cryptography >=3.2
    - jinja2 >=3
    - jsonschema >=2.5.1
    - marshmallow >=3.7.1,<4.0.0
    - mistune >=0.8.4
    - numpy >=1.21.6  # [py==39]
    - numpy >=1.22.4  # [py>=310 and py<312]
    - numpy >=1.26.0  # [py>=312]
    - packaging
    - pandas >=1.1.3,<2.2  # [py==39]
    - pandas >=1.3.0,<2.2  # [py>=310 and py<312]
    - pandas <2.2  # [py>=312]
    - posthog >3,<4
    - pydantic >=1.10.7
    - pyparsing >=2.4
    - python-dateutil >=2.8.1
    - requests >=2.20
    - ruamel.yaml >=0.16
    - scipy >=1.6.0
    - tqdm >=4.59.0
    - typing-extensions >=4.1.0
    - tzlocal >=1.2
    - python
  run_constrained:
    - pyspark >=2.3.2
    # Extra: arrow
    - feather-format >=0.4.1
    # Extra: athena
    - pyathena <3,>=2.0.0
    - sqlalchemy >=1.4.0,<2.0.0
    # Extra: s3
    - boto3 >=1.17.106
    # Extra: azure_secrets
    - azure-identity >=1.10.0
    - azure-keyvault-secrets >=4.0.0
    - azure-storage-blob >=12.5.0
    # Extra: gcp
    - gcsfs >=0.5.1
    - google-cloud-bigquery-core >=3.3.6
    - google-cloud-bigquery-storage >=2.20.0
    - google-cloud-secret-manager >=1.0.0
    - google-cloud-storage >=2.10.0  # [py>=311]
    - google-cloud-storage >=1.28.0  # [py<311]
    - pandas_gbq >=0.26.1
    - sqlalchemy-bigquery >=1.3.0
    # Extra: clickhouse
    - clickhouse-sqlalchemy >=0.2.2  # [py<312]
    - clickhouse-sqlalchemy >=0.3.0  # [py>=312]
    # Extra: cloud
    - orjson >=3.9.7
    # Extra: databricks
    - databricks-sqlalchemy >=1.0.0
    # Extra: mssql
    - pyodbc >=4.0.30
    # Extra: dremio
    - sqlalchemy-dremio ==1.2.1
    # Extra: excel
    - openpyxl >=3.0.7
    - xlrd >=1.1.0,<2.0.0
    # Extra: hive
    - PyHive >=0.6.5
    - thrift >=0.16.0
    - thrift-sasl >=0.4.3
    # Extra: mysql
    - PyMySQL >=1.1.1
    # Extra: pagerduty
    - pypd >=1.1.0
    # Extra: postgresql
    - psycopg2-binary >=2.7.6
    # Extra: redshift
    - sqlalchemy-redshift >=0.8.8
    # Extra: snowflake
    - snowflake-connector-python >=2.5.0 # [py<311]
    - snowflake-connector-python >2.9.0  # [py>=311]
    - snowflake-sqlalchemy >=1.2.3,!=1.7.0

test:
  source_files:
    - tests
  imports:
    - great_expectations
    - great_expectations.analytics
    - great_expectations.checkpoint
    - great_expectations.compatibility
    - great_expectations.core
    - great_expectations.data_context
    - great_expectations.datasource
    - great_expectations.exceptions
    - great_expectations.execution_engine
    - great_expectations.expectations
    - great_expectations.experimental
    - great_expectations.metrics
    - great_expectations.profile
    - great_expectations.render
    - great_expectations.self_check
    - great_expectations.types
    - great_expectations.validator
  requires:
    - pip
    - pytest
    - responses
    - pyarrow
    - boto3
    - freezegun >=0.3.15
    - pytest-mock >=3.14.0
    - sqlalchemy
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

    # Missing dependencies
    {% set ignore_tests = " --ignore=tests/integration/cloud/rest_contracts" %} # missing dep: pact
    {% set ignore_tests = ignore_tests + " --ignore=tests/datasource" %}   # missing dep: moto
    {% set ignore_tests = ignore_tests + " --ignore=tests/execution_engine" %}   # missing dep: moto
    {% set ignore_tests = ignore_tests + " --ignore=tests/actions" %}  # missing dep: moto
    {% set ignore_tests = ignore_tests + " --ignore=tests/data_context" %} # missing dep: moto
    {% set ignore_tests = ignore_tests + " --ignore=tests/expectations/core/test_expect_column_values_to_be_present_in_other_table.py" %} # missing relimp: contrib
    {% set ignore_tests = ignore_tests + " --ignore=tests/expectations/core/test_expect_queried_column_value_frequency_to_meet_threshold.py" %} # missing relimp: contrib
    {% set ignore_tests = ignore_tests + " --ignore=tests/expectations/core/test_expect_queried_table_row_count_to_be.py" %} # missing relimp: contrib
    {% set ignore_tests = ignore_tests + " --ignore=tests/integration/test_script_runner.py" %} # missing relimp: asset
    {% set ignore_tests = ignore_tests + " --ignore=tests/scripts/test_public_api_report.py" %} # missing relimp: docs
    {% set ignore_tests = ignore_tests + " --ignore=tests/test_markers.py" %} # missing relimp: tasks
    {% set ignore_tests = ignore_tests + " --ignore=tests/test_packaging.py" %} # missing relimp: requirements
    {% set ignore_tests = ignore_tests + " --ignore=tests/core/test__docs_decorators.py" %}

    # Tests missing DB, Spark or other data source connections:
    {% set ignore_tests = ignore_tests + " --deselect=tests/validator/test_metrics_calculator.py::test_column_partition_metric_for_spark" %}
    {% set ignore_tests = ignore_tests + " --ignore=tests/integration/spark/test_spark_connect.py" %}
    {% set ignore_tests = ignore_tests + " --ignore=tests/integration/spark/test_spark_config.py" %}
